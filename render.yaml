services:
  - type: web
    name: mcp-server
    runtime: docker
    region: oregon
    plan: free
    rootDir: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    initialDelaySeconds: 30
    envVars:
      - key: NODE_ENV
        value: production

      # ── Database ─────────────────────────────────────────────────────────────
      - key: DATABASE
        value: sqlite
      - key: SQLITE_PATH
        value: /app/data/database.sqlite

      # To use MongoDB Atlas instead, replace the values above with:
      # - key: DATABASE
      #   value: mongodb
      # - key: MONGODB_URI
      #   sync: false

      # ── Credenciais ──────────────────────────────────────────────────────────
      - key: DASHBOARD_USER
        value: admin
      - key: DASHBOARD_PASSWORD
        sync: false   # set in the Render dashboard

      # ── JWT ──────────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true
