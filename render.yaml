services:
  - type: web
    name: mcp-server
    runtime: docker
    region: oregon
    plan: free
    rootDir: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    initialDelaySeconds: 30
    envVars:
      - key: NODE_ENV
        value: production

      # Render injeta PORT automaticamente (10000 no free tier)
      - key: PORT
        value: 10000

      # ── Database ─────────────────────────────────────────────────────────────
      # Opção 1: SQLite (padrão, sem configuração extra)
      #   Atenção: no free tier o filesystem é efêmero — dados são perdidos a cada
      #   redeploy. Para persistência adicione um Render Disk em /app/data e defina
      #   SQLITE_PATH=/app/data/database.sqlite no dashboard.
      - key: DATABASE
        value: sqlite
      - key: SQLITE_PATH
        value: /app/data/database.sqlite

      # Opção 2: MongoDB Atlas (descomente e configure no dashboard)
      # - key: DATABASE
      #   value: mongodb
      # - key: MONGODB_URI
      #   sync: false   # cole a connection string no dashboard do Render

      # ── Credenciais ──────────────────────────────────────────────────────────
      - key: DASHBOARD_USER
        value: admin
      - key: DASHBOARD_PASSWORD
        value: admin    # troque no dashboard do Render antes de ir para produção

      # ── JWT ──────────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true
